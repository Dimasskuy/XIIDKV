<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALBUM XII DKV</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Space Grotesk', 'sans-serif'],
              hand: ['Caveat', 'cursive'],
            },
            colors: {
              dark: '#0a0a0a',
              card: '#171717',
              accent: '#d4d4d4',
              paper: '#f5f5f0',
            },
          },
        },
      };
    </script>
    <script defer src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        background-color: #050505;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      .grain-overlay, .bg-noise {
        background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyAQMAAAAn8y9KAAAABlBMVEUAAAD///+l2Z/dAAAAAXRSTlMAQObYZgAAAAxJREFUCNdjYGA4AAAAxADBDY9m0AAAAABJRU5ErkJggg==");
        background-repeat: repeat;
      }
      .grain-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 999;
        opacity: .045;
      }
      @keyframes float {
        0%,100% { transform: translateY(0) rotate(var(--tw-rotate, 0deg)); }
        50% { transform: translateY(-12px) rotate(var(--tw-rotate, 0deg)); }
      }
      .animate-float { animation: float 5s ease-in-out infinite; }
      .animate-float-delayed { animation: float 6s ease-in-out infinite .8s; }
      @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .animate-spin-slow { animation: spin-slow 16s linear infinite; }
      @keyframes pulse-slow { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
      .animate-pulse-slow { animation: pulse-slow 2.4s ease-in-out infinite; }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation: none !important;
          transition: none !important;
          scroll-behavior: auto !important;
        }
        .grain-overlay { opacity: .02; }
      }
      @media (max-width: 767px) {
        .grain-overlay { opacity: .03; }
      }
    </style>
  </head>
  <body>
    <div class="grain-overlay"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
